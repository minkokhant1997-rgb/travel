<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url(./img/golf-club-the-village-agriculture-canyons.jpg);
            background-size: cover;
            background-position: center;
        }

        .container {
            width: 850px;
            height: 500px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 5px 5px 5px 5px rgb(62, 60, 60);
        }

        .login_form {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .left {
            width: 45%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: linear-gradient(rgba(0, 0, 0, 0.3)), url(./img/Mrauk-U-Rakhine-State.avif);
            background-size: cover;
            background-position: center;
            border-top-left-radius: 15px;
            border-bottom-left-radius: 15px;
            position: relative;
        }

        .left h1 {
            font-size: 35px;
            color: white;
            margin-bottom: 10px;
        }

        .left p {
            font-size: 16px;
            color: white;
            text-align: center;
            line-height: 1.3;
        }

        .btn-both {
            display: flex;
            flex-direction: column;
            background: #f0f2f5;
            border: none;
            border-radius: 30px;
            box-shadow: 2px 5px 5px black;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 8px;
            margin-top: 12px;
            position: absolute;
            left: 83%;
        }

        .btn-login button {
            padding: 10px 25px;
            border-radius: 30px;
            width: 106px;
            background: #6e8efb;
            border: none;
            color: white;
            font-weight: bold;
        }

        .btn-signup button {
            padding: 10px 25px;
            border-radius: 30px;
            background: #6e8efb;
            border: none;
            color: white;
            font-weight: bold;
            width: 106px;
        }

        .btn-login button:active,
        .btn-signup button:active {
            background: white;
            transition: 0.3 ease;
            color: #6e8efb;
            border: 1px solid #6e8efb;
            transform: scale(1.01);
        }

        .right {
            width: 55%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            margin-left: 50px;
        }

        .profile {
            margin-bottom: 2px;
            margin-top: 30px;
        }

        .right h2 {
            font-size: 25px;
            margin-bottom: 12px;
            color: #6e8efb;
        }

        .input_group {
            background: #f0f2f5;
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
        }

        .input_group input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-size: 15px;
            padding: 0 10px;
        }

        .check {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            font-size: 14px;
            width: 100%;
        }

        .box {
            display: flex;
            color: #6e8efb;
        }

        .box input {
            margin-right: 10px;
        }

        .box span:hover {
            text-decoration: underline;
            color: rgb(238, 92, 92);
        }

        .check a {
            color: #6e8efb;
            text-decoration: none;
        }

        .check a:hover {
            text-decoration: underline;
            color: rgb(238, 92, 92);
        }

        .right button {
            background: #6e8efb;
            border: none;
            color: white;
            padding: 10px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
            box-shadow: 4px 5px 8px black;
            margin-top: 10px;
        }

        .right button:hover {
            background: white;
            color: #6e8efb;
        }

        .right button:active {
            color: #6e8efb;
            background-color: white;
            border: 2px solid #6e8efb;
            transition: 0.2s all ease;
            transform: scale(1.01);
        }

        .create {
            margin-top: 18px;
            margin-bottom: 5px;
            text-decoration: none;
            color: #6e8efb;
        }

        .create:hover {
            text-decoration: underline;
            color: rgb(238, 92, 92);
        }

        .right p {
            font-size: 14px;
            margin-bottom: 12px;
        }

        .social {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-bottom: 18px;
        }

        .social img {
            width: 50px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 2px 5px 5px black;
            cursor: pointer;
            transition: 0.3s;
        }

        .social img:hover {
            background: #f0f2f5;
            transform: translateY(-3px);
        }

        /* Responsive for phone */
        @media (max-width: 768px) {
            body {
                height: auto;
                min-height: 100vh;
                padding: 20px 10px;
            }

            .container {
                width: 80%;
                height: auto;
                max-width: 400px;
            }

            .login_form {
                flex-direction: column;
            }

            .left {
                width: 100%;
                height: 220px;
                border-top-right-radius: 15px;
                border-bottom-left-radius: 0px;
                padding: 30px 15px;
            }

            .left h1 {
                font-size: 28px;
            }

            .left p {
                font-size: 14px;
            }

            .btn-both {
                position: absolute;
                left: 50%;
                top: 100%;
                transform: translate(-50%, -50%);
                flex-direction: row;
                margin-top: 0px;
            }

            .right {
                width: 100%;
                margin-left: 0px;
                padding: 40px 20px 20px 20px;
            }

            .profile {
                margin-top: 15px;
            }

            .check {
                flex-direction: row;
                gap: 10px;
            }

            .social {
                gap: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="login_form" id="loginForm">
            <div class="left" back>
                <h1>Welcome!</h1>
                <p>LOGIN & SIGN IN <br> to security access your account</p>
                <div class="btn-both">
                    <a href="#" class="btn-login"><button onclick="Login()">LOGIN</button></a>
                    <a href="#" class="btn-signup"><button onclick="SignUp()">SIGN IN</button></a>
                </div>
            </div>

            <div class="right">
                <div class="profile">
                    <img src="./img/user.png" alt="User Profile" width="50px">
                </div>
                <h2>Login</h2>
                <div class="input_group">
                    <input type="email" placeholder="User email" required id="email">
                    <img src="./img/email.png" alt="" width="35px">
                </div>

                <div class="input_group">
                    <input type="password" placeholder="Password" required id="password">
                    <img src="./img/padlock.png" alt="" width="35px">
                </div>

                <div class="check">
                    <div class="box">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </div>
                    <a href="#">Forgot Password !</a>
                </div>

                <button onclick="showLogin()" class="btn">Login</button>

                <a href="#" class="create">Create Account</a>

                <p>or login with</p>

                <div class="social">
                    <img src="./img/facebook.png" alt="#" width="50px">
                    <img src="./img/google.png" alt="#" width="50px">
                    <img src="./img/link.png" alt="#" width="50px">
                    <img src="./img/telegram.png" alt="#" width="50px">
                </div>

            </div>
        </div>
    </div>

    <!-- လက်ရှိ HTML ရဲ့ နောက်ဆုံးနားမှာ အခုလို Script ပိုင်း ထည့်ပေးပါ -->
    <script>
        function showLogin() {
            // HTML input တွေထဲက တန်ဖိုးတွေကို ယူတာပါ
            const emailInput = document.getElementById('email').value.trim();
            const passwordInput = document.getElementById('password').value.trim();

            // // စမ်းသပ်ဖို့အတွက် သတ်မှတ်ထားတဲ့ email နဲ့ password
            // const correctEmail = "user@gmail.com";
            // const correctPassword = "123456";

            // တန်ဖိုးတွေ အလွတ်ဖြစ်နေလား အရင်စစ်မယ်
            if (emailInput === "" || passwordInput === "") {
                alert("ကျေးဇူးပြု၍ Email နှင့် Password ကို ဖြည့်စွက်ပေးပါ။");
                return;
            }

            // အချက်အလက် ကိုက်ညီမှု ရှိ/မရှိ စစ်ဆေးခြင်း
            if (emailInput === emailInput && passwordInput === passwordInput) {
                alert("Login အောင်မြင်ပါသည်။ Main Page သို့ ရွှေ့ပြောင်းပေးနေပါသည်...");

                // မှန်ကန်ရင် သွားစေချင်တဲ့ စာမျက်နှာ (main.html) ဆီ လမ်းကြောင်းပြောင်းတာပါ
                window.location.href = "main.html";
            } else {
                // မှားယွင်းခဲ့ရင် ပြမယ့် Error Message
                alert("Email သို့မဟုတ် Password မှားယွင်းနေပါသည်။ ပြန်လည်ကြိုးစားကြည့်ပါ။");
            }
        }
    </script>
</body>


</html>
